baseURL = 'https://blog.mare.run'
languageCode = 'en-us'
title = 'Mare Blog — Visual Reference Management'
theme = 'PaperMod'

# CRITICAL: Preserve Ghost URL structure for SEO
[permalinks]
  posts = '/:slug/'

# Build settings for performance
[build]
  writeStats = true
  
# Markup settings for SEO
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow HTML in markdown for schemas
  [markup.highlight]
    style = 'github'
    lineNos = true
    codeFences = true

# SEO & Site Parameters
[params]
  env = 'production'
  author = 'Mare'
  description = 'Expert guides on visual reference management, creative archiving, and design workflows for cultural creatives. Discover better alternatives to Pinterest and Are.na.'
  keywords = ['visual reference management', 'creative archiving', 'design workflow', 'pinterest alternative', 'are.na alternative']
  
  # PaperMod specific settings
  defaultTheme = 'auto'
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  
  # Assets
  assets = { favicon = '/favicon.ico', favicon16x16 = '/favicon-16x16.png', favicon32x32 = '/favicon-32x32.png', apple_touch_icon = '/apple-touch-icon.png', safari_pinned_tab = '/safari-pinned-tab.svg' }
  
  # Social/SEO Images
  images = ['/images/og-default.png']
  
  # GEO-SEO: Schema settings
  [params.schema]
    enabled = true
    type = 'BlogPosting'
    publisher = 'Mare'
    publisherLogo = '/images/logo.png'
  
  # GEO-SEO: LLMs.txt settings
  [params.llms]
    enableTxt = true
  
  # Profile (for schema)
  [params.profile]
    name = 'Mare'
    subtitle = 'Visual Reference Management for Cultural Creatives'
    imageUrl = '/images/mare-profile.png'
    imageTitle = 'Mare'
    buttons = [
      { name = 'Try Mare', url = 'https://mare.run' }
    ]
  
  # Home page info
  [params.homeInfoParams]
    Title = 'Visual Reference Management'
    Content = 'Expert guides on organizing, retrieving, and using visual inspiration. For designers, researchers, and cultural creatives who need more than Pinterest.'

# Social links
[[params.socialIcons]]
  name = 'twitter'
  url = 'https://twitter.com/marevisual'
  
[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/mare-visual'

# Menu structure
[[menu.main]]
  identifier = 'home'
  name = 'Home'
  url = '/'
  weight = 10
  
[[menu.main]]
  identifier = 'articles'
  name = 'Articles'
  url = '/posts/'
  weight = 20
  
[[menu.main]]
  identifier = 'tags'
  name = 'Topics'
  url = '/tags/'
  weight = 30
  
[[menu.main]]
  identifier = 'search'
  name = 'Search'
  url = '/search/'
  weight = 40

# Taxonomies for content organization
[taxonomies]
  tag = 'tags'
  category = 'categories'

# Privacy settings
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.twitter]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

# Output formats (for llms.txt)
[outputs]
  home = ['HTML', 'RSS', 'JSON', 'LLMS']
  
# Media types
[mediaTypes]
  [mediaTypes.'text/plain']
    suffixes = ['txt']

# Output formats definition
[outputFormats]
  [outputFormats.LLMS]
    mediaType = 'text/plain'
    baseName = 'llms'
    isPlainText = true
    notAlternative = true
